name: Pylint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and pylint
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]" pylint
      - name: Run Pylint error check
        run: python -m pylint --errors-only src/lean_probe tests
